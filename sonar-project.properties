sonar.host.url=https://sonarcloud.io
sonar.organization=jpdust
sonar.projectKey=jpdust_users-lambda
sonar.projectName=users-lambda

# Production sources and test sources
sonar.sources=.
sonar.exclusions=tests/**
sonar.tests=tests

sonar.python.version=3.14

# coverage.py XML report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclude test files from coverage measurement
sonar.coverage.exclusions=tests/**/*

# Block the CI step until SonarCloud returns a quality gate result
sonar.qualitygate.wait=true
